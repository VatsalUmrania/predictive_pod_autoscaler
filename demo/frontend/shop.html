<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopDemo — Powered by NEXUS Self-Healing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --card:     #1a1a26;
      --border:   rgba(255,255,255,0.07);
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --accent:   #7c6ef2;
      --green:    #00ff88;
      --danger:   #ff4d6a;
      --price:    #00d4ff;
      --radius:   14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      background: rgba(18,18,26,0.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 100;
    }
    .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .brand span { color: var(--accent); }
    .nexus-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 20px;
      background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2);
      font-size: 12px; font-weight: 500; color: var(--green);
      text-decoration: none; cursor: pointer;
      transition: all 0.2s;
    }
    .nexus-badge:hover { background: rgba(0,255,136,0.15); transform: translateY(-1px); }
    .nexus-badge .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .cart-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 10px;
      background: var(--accent); border: none; color: white;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .cart-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .cart-count {
      background: white; color: var(--accent);
      border-radius: 50%; width: 20px; height: 20px;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Main layout ── */
    main { max-width: 1280px; margin: 0 auto; padding: 40px 32px; }
    .section-title {
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 20px;
    }

    /* ── Product grid ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .product-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(124,110,242,0.06) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s;
    }
    .product-card:hover { transform: translateY(-4px); border-color: rgba(124,110,242,0.4); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .product-card:hover::before { opacity: 1; }
    .product-emoji { font-size: 40px; margin-bottom: 16px; display: block; }
    .product-category {
      font-size: 11px; font-weight: 600; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
    }
    .product-name { font-size: 16px; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
    .product-price { font-size: 20px; font-weight: 700; color: var(--price); }
    .add-btn {
      background: var(--accent); color: white; border: none;
      border-radius: 8px; padding: 7px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .add-btn:hover { filter: brightness(1.2); }
    .stock-badge {
      font-size: 11px; color: var(--muted); margin-top: 6px;
    }

    /* ── Orders table ── */
    .orders-section { margin-top: 8px; }
    .orders-table { width: 100%; border-collapse: collapse; }
    .orders-table th {
      text-align: left; padding: 10px 16px;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      border-bottom: 1px solid var(--border);
    }
    .orders-table td {
      padding: 12px 16px; font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .orders-table tr:hover td { background: rgba(255,255,255,0.02); }
    .order-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .status-completed { background: rgba(0,255,136,0.1); color: var(--green); }
    .status-pending   { background: rgba(255,170,0,0.1);  color: #ffaa00; }
    .status-failed    { background: rgba(255,77,106,0.1);  color: var(--danger); }

    /* ── Cart drawer ── */
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 200;
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-drawer {
      position: fixed; top: 0; right: -420px; width: 420px; height: 100vh;
      background: var(--surface); border-left: 1px solid var(--border);
      padding: 32px; transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 201; overflow-y: auto; display: flex; flex-direction: column;
    }
    .cart-drawer.open { right: 0; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .cart-header h2 { font-size: 20px; font-weight: 700; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
    .cart-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .cart-item-emoji { font-size: 28px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 600; }
    .cart-item-price { font-size: 13px; color: var(--price); margin-top: 3px; }
    .cart-item-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
    .cart-item-remove:hover { color: var(--danger); }
    .cart-total { margin-top: auto; padding-top: 24px; }
    .cart-total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .checkout-btn {
      width: 100%; padding: 16px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #5b8def);
      border: none; color: white; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .checkout-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .empty-cart { text-align: center; color: var(--muted); padding: 40px 0; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--card); border: 1px solid var(--border);
      border-left: 4px solid var(--green);
      border-radius: 10px; padding: 14px 20px;
      font-size: 14px; font-weight: 500;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s; z-index: 300;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: var(--danger); }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

<header>
  <div class="brand">Shop<span>Demo</span></div>
  <div style="display:flex;align-items:center;gap:16px">
    <a class="nexus-badge" href="console.html" target="_blank" title="Open NEXUS Console">
      <div class="dot"></div>
      NEXUS ACTIVE — Open Console ↗
    </a>
    <button class="cart-btn" onclick="openCart()">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<main>
  <div class="section-title">Products</div>
  <div class="products-grid" id="productsGrid">
    <!-- Loaded from backend -->
    <div class="product-card skeleton" style="height:220px"></div>
    <div class="product-card skeleton" style="height:220px"></div>
    <div class="product-card skeleton" style="height:220px"></div>
    <div class="product-card skeleton" style="height:220px"></div>
  </div>

  <div class="section-title">Recent Orders</div>
  <div class="orders-section">
    <table class="orders-table">
      <thead>
        <tr>
          <th>#</th><th>Product</th><th>Qty</th><th>Total</th><th>Status</th><th>Time</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="6" style="color:var(--muted);padding:24px;text-align:center">Loading orders…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Cart drawer -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2>🛒 Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div id="cartItems"></div>
  <div class="cart-total" id="cartTotal"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SHOP_URL = 'http://localhost:8001';
let cart = [];

// ── Load products ──────────────────────────────────────────────────────────────
async function loadProducts() {
  try {
    const r = await fetch(`${SHOP_URL}/products`);
    if (!r.ok) throw new Error(await r.text());
    const products = await r.json();
    renderProducts(products);
  } catch (e) {
    document.getElementById('productsGrid').innerHTML =
      `<div style="color:#ff4d6a;padding:20px;grid-column:1/-1">⚠️ ${e.message}</div>`;
  }
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.emoji}')">
      <span class="product-emoji">${p.emoji || '📦'}</span>
      <div class="product-category">${p.category}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-footer">
        <div class="product-price">$${p.price.toFixed(2)}</div>
        <button class="add-btn" onclick="event.stopPropagation();addToCart(${p.id},'${p.name}',${p.price},'${p.emoji}')">
          Add +
        </button>
      </div>
      <div class="stock-badge">In stock: ${p.stock}</div>
    </div>
  `).join('');
}

// ── Cart ──────────────────────────────────────────────────────────────────────
function addToCart(id, name, price, emoji) {
  const existing = cart.find(i => i.id === id);
  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ id, name, price, emoji, quantity: 1 });
  }
  updateCartUI();
  showToast(`${emoji} ${name} added to cart`);
}

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  document.getElementById('cartCount').textContent = count;

  const container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = '<div class="empty-cart">🛒 Your cart is empty</div>';
    document.getElementById('cartTotal').innerHTML = '';
    return;
  }

  container.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <span class="cart-item-emoji">${item.emoji}</span>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">$${item.price.toFixed(2)} × ${item.quantity}</div>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart(${idx})">✕</button>
    </div>
  `).join('');

  const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  document.getElementById('cartTotal').innerHTML = `
    <div class="cart-total-row"><span>Total</span><span style="color:var(--price)">$${total.toFixed(2)}</span></div>
    <button class="checkout-btn" onclick="checkout()">Place Order →</button>
  `;
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartUI();
}

function openCart()  { document.getElementById('cartDrawer').classList.add('open'); document.getElementById('cartOverlay').classList.add('open'); }
function closeCart() { document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('open'); }

async function checkout() {
  if (cart.length === 0) return;
  for (const item of cart) {
    try {
      const r = await fetch(`${SHOP_URL}/orders`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ product_id: item.id, quantity: item.quantity }),
      });
      if (!r.ok) { showToast('⚠️ Order failed — check NEXUS console', true); return; }
    } catch {
      showToast('❌ Checkout error — service may be down', true); return;
    }
  }
  showToast(`✅ ${cart.length} item(s) ordered!`);
  cart = [];
  updateCartUI();
  closeCart();
  setTimeout(loadOrders, 500);
}

// ── Orders ────────────────────────────────────────────────────────────────────
async function loadOrders() {
  try {
    const r = await fetch(`${SHOP_URL}/orders`);
    const orders = await r.json();
    const tbody = document.getElementById('ordersBody');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:24px">No orders yet — add products to cart!</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td style="color:var(--muted)">#${o.id}</td>
        <td>${o.product_name || '—'}</td>
        <td>${o.quantity}</td>
        <td style="color:var(--price)">$${parseFloat(o.total).toFixed(2)}</td>
        <td><span class="order-status status-${o.status}">${o.status}</span></td>
        <td style="color:var(--muted);font-size:13px">${o.created_at?.slice(0,19) || ''}</td>
      </tr>
    `).join('');
  } catch { }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.className = 'toast', 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadProducts();
loadOrders();
setInterval(loadOrders, 10000);
</script>
</body>
</html>
