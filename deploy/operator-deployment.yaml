apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppa-operator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ppa-operator
  template:
    metadata:
      labels:
        app: ppa-operator
    spec:
      serviceAccountName: ppa-operator
      containers:
        - name: operator
          image: ppa-operator:latest
          imagePullPolicy: Never # built locally via minikube docker-env
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-kube-prometheus-prometheus.monitoring:9090"
            - name: PPA_TIMER_INTERVAL
              value: "30"
            - name: PPA_INITIAL_DELAY
              value: "60"
            - name: PPA_LOOKBACK_STEPS
              value: "60"
            - name: PPA_STABILIZATION_STEPS
              value: "2"
            - name: PPA_PROM_FAILURE_THRESHOLD
              value: "10"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ppa-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ppa-models
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
