apiVersion: batch/v1
kind: CronJob
metadata:
  name: ppa-data-collector
  namespace: default
spec:
  schedule: "0 * * * *"    # Runs every hour
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: data-collector
            image: python:3.9-slim
            command: ["python3", "/app/export_training_data.py"]
            env:
            - name: TARGET_APP          # ← Change this to switch projects
              value: "test-app"
            - name: PROMETHEUS_URL      # ← Internal cluster DNS, no port-forward
              value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
            - name: NAMESPACE
              value: "default"
            - name: CONTAINER_NAME
              value: "nginx"
            - name: OUTPUT_PATH
              value: "/data/training_data.csv"
            volumeMounts:
            - name: training-data
              mountPath: /data
            - name: scripts
              mountPath: /app
          volumes:
          - name: training-data
            persistentVolumeClaim:
              claimName: ppa-training-data-pvc
          - name: scripts
            configMap:
              name: ppa-collector-scripts
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ppa-training-data-pvc
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
