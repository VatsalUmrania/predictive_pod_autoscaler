# Prometheus configuration for the NEXUS dev stack.
# The OTel Collector pushes metrics via remote write.
# Prometheus also scrapes itself and the OTel collector.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: "nexus-dev"
    env:     "development"

# Remote write receiver is enabled via CLI flag --web.enable-remote-write-receiver
# OTel Collector pushes to http://prometheus:9090/api/v1/write

scrape_configs:
  # Self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector self-metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # NATS JetStream monitoring
  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics
