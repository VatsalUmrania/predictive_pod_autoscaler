# Tempo configuration for NEXUS dev stack
# Minimal single-binary mode — stores traces in local filesystem.
# In production, use distributed Tempo with object storage (S3/GCS).

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:           # Receives traces from OTel Collector
        http:

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h   # Keep 24h of traces in dev

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

querier:
  frontend_worker:
    frontend_address: 127.0.0.1:9095
