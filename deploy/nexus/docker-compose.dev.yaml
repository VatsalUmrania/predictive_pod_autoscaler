# NEXUS Development Stack
# ========================
# Complete observability + event bus dev environment.
#
# Services:
#   nats        — NATS JetStream (event bus)
#   otel        — OpenTelemetry Collector (receives all signals, routes to backends)
#   prometheus  — Metrics storage + querying
#   loki        — Log aggregation
#   tempo       — Distributed trace storage
#   grafana     — Unified dashboards (datasources + NEXUS dashboard pre-provisioned)
#   opa         — Open Policy Agent (governance policies)
#   redis       — Cooldown store (Phase 3)
#   nexus-api   — Status API + /metrics (Phase 7)
#
# Usage:
#   cd deploy/nexus
#   docker compose -f docker-compose.dev.yaml up -d
#   open http://localhost:3000        (Grafana, admin/nexus_admin)
#   open http://localhost:8080/docs   (NEXUS Status API)
#   open http://localhost:8222        (NATS monitoring)
#   open http://localhost:9090        (Prometheus)

services:

  # ── NATS JetStream ──────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: nexus-nats
    command:
      - "--js"                          # Enable JetStream
      - "--sd=/data"                    # JetStream data directory
      - "--http_port=8222"              # Monitoring endpoint
      - "--name=nexus-nats"
    ports:
      - "4222:4222"                     # NATS client connections
      - "8222:8222"                     # NATS monitoring UI
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── OpenTelemetry Collector ─────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: nexus-otel
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"                     # OTLP gRPC (agents → collector)
      - "4318:4318"                     # OTLP HTTP (agents → collector)
      - "8888:8888"                     # Collector self-metrics (scraped by Prometheus)
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: nexus-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"   # Accept push from OTel Collector
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Loki (log aggregation) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: nexus-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Tempo (distributed tracing) ─────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.2
    container_name: nexus-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"                     # Tempo HTTP API (queried by Grafana)
      - "4317"                          # OTLP gRPC (internal, not exposed)
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: nexus-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=nexus_admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_started
    restart: unless-stopped

  # ── OPA (Open Policy Agent) ─────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.64.1
    container_name: nexus-opa
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "--log-format=json"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    ports:
      - "8181:8181"                     # OPA REST API
    volumes:
      - ../opa:/policies:ro             # nexus_policies.rego
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (cooldown store) ───────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: nexus-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"                     # CooldownStore client connections
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── NEXUS Status API (Phase 7 — observability) ───────────────────────────────
  nexus-api:
    image: python:3.12-slim
    container_name: nexus-api
    working_dir: /app
    entrypoint: ["sh", "-c"]
    command:
      - "pip install -q fastapi uvicorn prometheus-client httpx pydantic pyyaml aiosqlite && uvicorn nexus.observability.status_api:app --host 0.0.0.0 --port 8080 --log-level info"
    volumes:
      - ../../src:/app            # Mount project source
      - nexus_data:/data          # Persistent audit + knowledge DBs
    ports:
      - "8080:8080"               # Status API + /metrics
    environment:
      - PYTHONPATH=/app
      - NEXUS_AUDIT_DB_PATH=/data/nexus_audit.db
      - NEXUS_KNOWLEDGE_DB_PATH=/data/nexus_knowledge.db
      - NEXUS_GEMINI_API_KEY=${NEXUS_GEMINI_API_KEY:-}
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  nats_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  nexus_data:      # Audit trail + KnowledgeBase SQLite DBs

networks:
  default:
    name: nexus-dev
