apiVersion: ppa.example.com/v1
kind: PredictiveAutoscaler
metadata:
  name: test-app-ppa-rps-t3m
  namespace: default
spec:
  targetDeployment: "test-app"
  appName: "test-app"
  horizon: "rps_t3m"
  minReplicas: 1
  maxReplicas: 10
  capacityPerPod: 20
  scaleUpRate: 2.0
  scaleDownRate: 1.0
  safetyFactor: 1.15
  observerMode: true   # shadow-mode: predicts but does NOT scale
  # modelPath / scalerPath / targetScalerPath are REMOVED (deprecated).
  # Artifacts are resolved automatically from:
  #   Layout 1 (preferred): /models/test-app/rps_t3m/current/
  #   Layout 2 (fallback):  /models/rps_t3m/
