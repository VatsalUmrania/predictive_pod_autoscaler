apiVersion: v1
kind: ConfigMap
metadata:
  name: locustfile
  namespace: default
data:
  locustfile.py: |
    from locust import HttpUser, task, between, LoadTestShape
    import random

    class TestAppUser(HttpUser):
        wait_time = between(0.5, 2.0)
        
        @task(3)
        def index(self):
            self.client.get("/")
        
        @task(1)
        def health(self):
            self.client.get("/health")

    class StagesShape(LoadTestShape):
        """
        A shape class which loads test in stages.
        Starts at 10 users for 5 minutes, then ramps up to 250 users
        """
        stages = [
            {"duration": 300, "users": 50, "spawn_rate": 5},
            {"duration": 300, "users": 150, "spawn_rate": 10},
            {"duration": 600, "users": 250, "spawn_rate": 20},
            {"duration": 300, "users": 100, "spawn_rate": 10},
        ]

        def tick(self):
            run_time = self.get_run_time()
            for stage in self.stages:
                if run_time < stage["duration"]:
                    tick_data = (stage["users"], stage["spawn_rate"])
                    return tick_data
            return None
