# PredictiveAutoscaler CR for test-app (rps_t10m champion, sMAPE 16.7%)
apiVersion: ppa.example.com/v1
kind: PredictiveAutoscaler
metadata:
  name: test-app-ppa
  namespace: default
spec:
  targetDeployment: test-app
  namespace: default
  minReplicas: 2
  maxReplicas: 20
  capacityPerPod: 80
  modelPath: /models/test-app/ppa_model.tflite
  scalerPath: /models/test-app/scaler.pkl
  targetScalerPath: /models/test-app/target_scaler.pkl
  scaleUpRate: 2.0
  scaleDownRate: 0.7
  safetyFactor: 1.10
