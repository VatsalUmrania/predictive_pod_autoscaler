# rps_t3m — OBSERVER only (sMAPE 10.47 — shadow, does not scale)
apiVersion: ppa.example.com/v1
kind: PredictiveAutoscaler
metadata:
  name: test-app-ppa-t3m
  namespace: default
spec:
  targetDeployment: test-app
  namespace: default
  minReplicas: 2
  maxReplicas: 20
  capacityPerPod: 80
  modelPath: /models/rps_t3m/ppa_model_rps_t3m.tflite
  scalerPath: /models/rps_t3m/scaler_rps_t3m.pkl
  targetScalerPath: /models/rps_t3m/target_scaler_rps_t3m.pkl
  scaleUpRate: 2.0
  scaleDownRate: 0.7
  safetyFactor: 1.10
  observerMode: true
---
