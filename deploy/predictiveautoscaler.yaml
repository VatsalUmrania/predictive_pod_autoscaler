# Example: PredictiveAutoscaler CR for test-app
apiVersion: ppa.example.com/v1
kind: PredictiveAutoscaler
metadata:
  name: test-app-ppa
  namespace: default
spec:
  targetDeployment: test-app
  namespace: default
  minReplicas: 2
  maxReplicas: 20
  capacityPerPod: 80
  # modelPath: ""       # empty = auto-resolves to /models/test-app/ppa_model.tflite
  # scalerPath: ""       # empty = auto-resolves to /models/test-app/scaler.pkl
  # scaleUpRate: 2.0
  # scaleDownRate: 0.5
