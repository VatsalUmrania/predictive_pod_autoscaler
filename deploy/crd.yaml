apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: predictiveautoscalers.ppa.example.com
spec:
  group: ppa.example.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: ["targetDeployment"]
            properties:
              targetDeployment:
                type: string
                description: Name of the Deployment to autoscale
              minReplicas:
                type: integer
                default: 2
                minimum: 1
              maxReplicas:
                type: integer
                default: 20
                minimum: 1
              capacityPerPod:
                type: integer
                default: 50
                description: Max requests/second each pod can handle
          status:
            type: object
            properties:
              lastPredictedLoad:
                type: number
              currentReplicas:
                type: integer
              desiredReplicas:
                type: integer
              lastScaleTime:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Target
      type: string
      jsonPath: .spec.targetDeployment
    - name: Current
      type: integer
      jsonPath: .status.currentReplicas
    - name: Desired
      type: integer
      jsonPath: .status.desiredReplicas
    - name: Predicted Load
      type: number
      jsonPath: .status.lastPredictedLoad
  scope: Namespaced
  names:
    plural: predictiveautoscalers
    singular: predictiveautoscaler
    kind: PredictiveAutoscaler
    shortNames:
    - ppa
