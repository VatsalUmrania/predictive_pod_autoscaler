apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: predictiveautoscalers.ppa.example.com
spec:
  scope: Namespaced
  group: ppa.example.com
  names:
    kind: PredictiveAutoscaler
    plural: predictiveautoscalers
    singular: predictiveautoscaler
    shortNames:
    - ppa
  versions:
  - name: v1
    served: true
    storage: true
    subresources:
      status: {}
      scale:
        specReplicasPath: .spec.maxReplicas
        statusReplicasPath: .status.currentReplicas
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-preserve-unknown-fields: true
        properties:
          spec:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              targetDeployment:
                type: string
                description: Name of the Deployment to autoscale
              namespace:
                type: string
                default: "default"
                description: Namespace of the target Deployment
              minReplicas:
                type: integer
                default: 2
              maxReplicas:
                type: integer
                default: 20
              capacityPerPod:
                type: integer
                default: 80
              appName:
                type: string
              horizon:
                type: string
              modelPath:
                type: string
                default: ""
              scalerPath:
                type: string
                default: ""
              scaleUpRate:
                type: number
                default: 2.0
              scaleDownRate:
                type: number
                default: 0.7
              safetyFactor:
                type: number
                default: 1.1
              targetScalerPath:
                type: string
                default: ""
              containerName:
                type: string
                default: ""
              observerMode:
                type: boolean
                default: false
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              lastPredictedLoad:
                type: number
              currentReplicas:
                type: integer
              desiredReplicas:
                type: integer
              lastScaleTime:
                type: string
              consecutiveSkips:
                type: integer
              historySnapshot:
                type: object
              conceptDriftDetected:
                type: boolean
              driftSeverity:
                type: string
              predictionErrorPct:
                type: number
              retrainingRecommended:
                type: boolean
              retrainingReason:
                type: string
              circuitBreakerTripped:
                type: boolean
              fallbackScaling:
                type: boolean
              fallbackReason:
                type: string
              fallbackReplicas:
                type: integer
              metricFailures:
                type: integer
              lastMetricError:
                type: string
              lastMetricErrorTime:
                type: string
    additionalPrinterColumns:
    - name: Target
      type: string
      jsonPath: .spec.targetDeployment
    - name: Current
      type: integer
      jsonPath: .status.currentReplicas
    - name: Desired
      type: integer
      jsonPath: .status.desiredReplicas
    - name: Predicted Load
      type: number
      jsonPath: .status.lastPredictedLoad
    - name: Skips
      type: integer
      jsonPath: .status.consecutiveSkips
