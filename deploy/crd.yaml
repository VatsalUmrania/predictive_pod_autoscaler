apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: predictiveautoscalers.ppa.example.com
spec:
  group: ppa.example.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: ["targetDeployment"]
            properties:
              targetDeployment:
                type: string
                description: Name of the Deployment to autoscale
              namespace:
                type: string
                default: "default"
                description: Namespace of the target Deployment
              minReplicas:
                type: integer
                default: 2
                minimum: 1
              maxReplicas:
                type: integer
                default: 20
                minimum: 1
              capacityPerPod:
                type: integer
                default: 80
                description: Max requests/second each pod can handle
              modelPath:
                type: string
                default: ""
                description: "Path to TFLite model file (empty = auto /models/{target}/ppa_model.tflite)"
              scalerPath:
                type: string
                default: ""
                description: "Path to sklearn scaler file (empty = auto /models/{target}/scaler.pkl)"
              scaleUpRate:
                type: number
                default: 2.0
                description: Max scale-up multiplier per cycle
              scaleDownRate:
                type: number
                default: 0.5
                description: Max scale-down multiplier per cycle
              targetScalerPath:
                type: string
                default: ""
                description: "Path to target scaler file (empty = auto /models/{target}/target_scaler.pkl)"
              containerName:
                type: string
                default: ""
                description: "Container name for PromQL queries (empty = all containers)"
          status:
            type: object
            properties:
              lastPredictedLoad:
                type: number
              currentReplicas:
                type: integer
              desiredReplicas:
                type: integer
              lastScaleTime:
                type: string
              consecutiveSkips:
                type: integer
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Target
      type: string
      jsonPath: .spec.targetDeployment
    - name: Namespace
      type: string
      jsonPath: .spec.namespace
    - name: Current
      type: integer
      jsonPath: .status.currentReplicas
    - name: Desired
      type: integer
      jsonPath: .status.desiredReplicas
    - name: Predicted Load
      type: number
      jsonPath: .status.lastPredictedLoad
    - name: Skips
      type: integer
      jsonPath: .status.consecutiveSkips
  scope: Namespaced
  names:
    plural: predictiveautoscalers
    singular: predictiveautoscaler
    kind: PredictiveAutoscaler
    shortNames:
    - ppa
