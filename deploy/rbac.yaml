apiVersion: v1
kind: ServiceAccount
metadata:
  name: ppa-operator
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ppa-operator-role
rules:
  # CRD discovery (kopf requirement)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["list", "get", "watch"]
  
  # PredictiveAutoscaler CRs (our custom resource)
  - apiGroups: ["ppa.example.com"]
    resources: ["predictiveautoscalers"]
    verbs: ["create", "list", "get", "watch", "patch", "update"]
  
  - apiGroups: ["ppa.example.com"]
    resources: ["predictiveautoscalers/status"]
    verbs: ["get", "patch", "update"]
  
  # Deployments (for scaling test-app)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
  
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  
  # Pods (for reading metrics)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get", "watch"]
  
  # Events (for kopf logging)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ppa-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ppa-operator-role
subjects:
  - kind: ServiceAccount
    name: ppa-operator
    namespace: default