apiVersion: v1
kind: ServiceAccount
metadata:
  name: ppa-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ppa-operator-role
rules:
# WARNING: ClusterRole grants cross-namespace scaling permissions.
# For multi-tenant clusters, replace ClusterRole/ClusterRoleBinding with
# per-namespace Role/RoleBinding to limit the operator to specific namespaces:
#
#   kind: Role                         (not ClusterRole)
#   metadata:
#     namespace: production             (scoped to one namespace)
#   ---
#   kind: RoleBinding                   (not ClusterRoleBinding)
#   metadata:
#     namespace: production
#
# Current ClusterRole is acceptable for single-tenant / dev clusters.
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "update", "patch"]
# Read pods
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Manage PredictiveAutoscaler CRs
- apiGroups: ["ppa.example.com"]
  resources: ["predictiveautoscalers", "predictiveautoscalers/status"]
  verbs: ["get", "list", "watch", "update", "patch"]
# Events (kopf creates events for logging)
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# kopf peering — required for multi-operator coordination
- apiGroups: ["kopf.dev"]
  resources: ["clusterkopfpeerings"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ppa-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ppa-operator-role
subjects:
- kind: ServiceAccount
  name: ppa-operator
  namespace: default
